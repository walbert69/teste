<!DOCTYPE html>
<html>
<head>
<title>Cadastro</title>
<meta charset="UTF-8">

<link rel="stylesheet" href="css/style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="js/script.js"></script>

</head>

<body>

<header class="container text-center mt-3">

<h1>Petshop Mundo Animal</h1>

<nav>
<a href="index.html">Início</a> |
<a href="cadastro.html">Cadastro</a> | 
<a href="produtos.html">Produtos</a> |
<a href="servicos.html">Serviços</a> |
<a href="contato.html">Contato</a> 
</nav>

</header>

<hr>

<div class="container">

<h2>Cadastro do Cliente e Pet</h2>

<form onsubmit="enviarFormulario(event)">

<!-- CLIENTE -->
<h3>Dados do Cliente</h3>

<div class="mb-2">
<label>Nome:</label>
<input type="text" class="form-control" placeholder="Digite seu nome" required>
</div>

<div class="mb-2">
<label>Endereço:</label>
<input type="text" class="form-control" placeholder="Digite seu endereço" required>
</div>

<div class="mb-2">
<label>CPF:</label>
<input type="text" id="cpf" class="form-control" placeholder="Digite seu CPF" maxlength="11" required oninput="formatarCPF()">
</div>

<div class="mb-2">
<label>Sexo:</label><br>
<input type="radio" name="sexo" required> Masculino
<input type="radio" name="sexo"> Feminino
</div>

<div class="mb-2">
<label>Telefone:</label>
<input type="tel" class="form-control" placeholder="(xx) xxxxx-xxxx">
</div>

<div class="mb-2">
<label>Email:</label>
<input type="email" class="form-control" placeholder="Digite seu email" required>
</div>

<hr>

<!-- PET -->
<h3>Dados do Pet</h3>

<div class="mb-2">
<label>Nome do Pet:</label>
<input type="text" class="form-control" placeholder="Nome do pet" required>
</div>

<div class="mb-2">
<label>Raça:</label>
<input type="text" class="form-control" placeholder="Raça do pet">
</div>

<div class="mb-2">
<label>Idade:</label>
<input type="number" class="form-control" placeholder="Idade do pet">
</div>

<hr>

<!-- AGENDAMENTO -->
<h3>Agendamento</h3>

<div class="mb-2">
<label>Serviço:</label>
<select class="form-control" required>
<option value="">Selecione</option>
<option>Banho</option>
<option>Tosa</option>
</select>
</div>

<div class="mb-2">
<label>Forma de atendimento:</label><br>
<input type="radio" name="entrega" required> Tele-busca
<input type="radio" name="entrega"> Levar ao local
</div>

<div class="mb-2">
<label>Data:</label>
<input type="date" class="form-control" required>
</div>

<div class="mb-2">
<label>Hora:</label>
<input type="time" class="form-control" required>
</div>

<br>

<button type="submit" class="btn btn-primary">Agendar</button>

</form>

</div>

<hr>

<footer class="container text-center">
<p>Autor: Walbert Estevam Garcia</p>
</footer>

</body>
</html>
